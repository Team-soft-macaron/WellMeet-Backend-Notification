spring:
  application:
    name: wellmeet-notification
  config:
    import: classpath:local-secret.yml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/wellmeet_noti
    username: root
    password:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      platform: mysql
      encoding: UTF-8
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${secret.mail.username:test@example.com}
    password: ${secret.mail.password:testpassword}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          timeout: 5000
          connectiontimeout: 5000
          writetimeout: 5000
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.JsonSerializer

cors:
  origin: http://localhost:5173

vapid:
  public-key: ${secret.vapid.public-key}
  private-key: ${secret.vapid.private-key}
  subject: ${secret.vapid.subject}
server:
  port: 8082
